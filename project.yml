name: Donpa

options:
  bundleIdPrefix: fi.misaki
  deploymentTarget:
    iOS: "16.0"
    macOS: "14.0"
  createIntermediateGroups: true
  developmentLanguage: en

packages:
  DonpaCore:
    path: Packages/DonpaCore

targets:
  Donpa-iOS:
    type: application
    platform: iOS
    sources:
      - path: Sources/iOS
      - path: Sources/Shared
    info:
      path: Sources/iOS/Info.plist
      properties:
        CFBundleDisplayName: Donpa Squad
        # Track the version build settings so MARKETING_VERSION is the single
        # source of truth (was hardcoded to 1.0).
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        # No encryption → declare it so every TestFlight/App Store upload skips
        # the export-compliance prompt.
        ITSAppUsesNonExemptEncryption: false
        LSApplicationCategoryType: public.app-category.puzzle
        # Launch screen: the mono burst-mine centered on a charcoal ground (both
        # asset-catalog entries), matching the app's "interior-page" B&W look.
        UILaunchScreen:
          UIImageName: LaunchImage
          UIImageRespectsSafeAreaInsets: true
          UIColorName: LaunchBackground
        # All four orientations: a universal (iPhone + iPad) app must support them
        # for iPad multitasking, or App Store validation rejects the build. The
        # board is orientation-agnostic, so upside-down portrait is harmless.
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: fi.misaki.donpa
        # User-visible app/bundle name; without this it'd be the target name
        # "Donpa-iOS". Module name stays Donpa_iOS (PRODUCT_MODULE_NAME).
        PRODUCT_NAME: Donpa Squad
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "2"
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # Signing: the personal paid-account team. Automatic signing lets Xcode
        # manage the certs/profiles for archive + TestFlight upload.
        DEVELOPMENT_TEAM: U84DT7P75P
        CODE_SIGN_STYLE: Automatic
    dependencies:
      - package: DonpaCore
        product: DonpaKit
    # Stamp the git commit into the bundled Info.plist (GitCommitSHA) so every
    # build self-identifies its source. Runs last, after the plist is copied
    # into the product; fires on archive too. See Scripts/embed-commit-sha.sh.
    postBuildScripts:
      - script: "\"$SRCROOT/Scripts/embed-commit-sha.sh\""
        name: Embed git commit SHA
        basedOnDependencyAnalysis: false
    scheme:
      # Wire the UI tests into the iOS app's scheme so `xcodebuild test
      # -scheme Donpa-iOS` runs them (used by `make uitest`, locally only).
      testTargets:
        - Donpa-iOSUITests

  # Local-only UI regression tests. CI runs `swift test` (the package logic
  # suite) and `xcodebuild build` only — never `xcodebuild test` — so this
  # target is built but its tests run solely via `make uitest` on a dev machine.
  Donpa-iOSUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: Tests/UITests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: fi.misaki.donpa.uitests
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: Donpa-iOS

  Donpa-macOS:
    type: application
    platform: macOS
    sources:
      - path: Sources/macOS
      - path: Sources/Shared
    info:
      path: Sources/macOS/Info.plist
      properties:
        CFBundleDisplayName: Donpa Squad
        CFBundleName: Donpa Squad  # menu-bar app name (else PRODUCT_NAME)
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        ITSAppUsesNonExemptEncryption: false
        LSApplicationCategoryType: public.app-category.puzzle
        LSMinimumSystemVersion: "13.0"
        NSHighResolutionCapable: true
    settings:
      base:
        # Distinct from iOS: the Mac app is a separate native App Store Connect
        # record, so it needs its own bundle ID. Locked in before registering
        # IDs with Apple (changing it afterward is painful).
        PRODUCT_BUNDLE_IDENTIFIER: fi.misaki.donpa.mac
        # The app's user-visible name everywhere the OS shows it (Dock,
        # Cmd-Tab switcher, .app filename). Without this it's the target name
        # "Donpa-macOS". The module name stays Donpa_macOS (PRODUCT_MODULE_NAME).
        PRODUCT_NAME: Donpa Squad
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "2"
        GENERATE_INFOPLIST_FILE: NO
        ENABLE_HARDENED_RUNTIME: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # Signing: same personal paid-account team as iOS; automatic signing.
        DEVELOPMENT_TEAM: U84DT7P75P
        CODE_SIGN_STYLE: Automatic
    # See the iOS target: stamp the git commit into the bundled Info.plist.
    postBuildScripts:
      - script: "\"$SRCROOT/Scripts/embed-commit-sha.sh\""
        name: Embed git commit SHA
        basedOnDependencyAnalysis: false
    dependencies:
      - package: DonpaCore
        product: DonpaKit

# Coverage tracks the testable logic, not the SwiftKit/AppKit view layer (which
# needs UI automation this project doesn't run). Keep the signal on Core +
# Scoreboard; don't let untestable view code fail PRs.

coverage:
  status:
    project:
      default:
        target: auto          # don't drop below the current project coverage
        threshold: 2%         # tolerate small fluctuations
    patch:
      default:
        target: 80%           # new (non-ignored) code must be ≥80% covered
        threshold: 0%         # no slack below the target

comment:
  # Only comment when coverage actually changed; keeps PRs quiet.
  require_changes: true

# The SpriteKit scene and SwiftUI views need UI automation to exercise, which
# this project doesn't run. CellLayout is intentionally NOT ignored — it's pure
# geometry and should be unit-tested.
ignore:
  - "Packages/DonpaCore/Sources/DonpaKit/BoardScene.swift"
  - "Packages/DonpaCore/Sources/DonpaKit/BoardScene+Effects.swift"
  - "Packages/DonpaCore/Sources/DonpaKit/BoardScene+Pan.swift"
  - "Packages/DonpaCore/Sources/DonpaKit/BoardView.swift"
  - "Packages/DonpaCore/Sources/DonpaKit/GameView.swift"
  - "Packages/DonpaCore/Sources/DonpaKit/SheetViews.swift"
  - "Packages/DonpaCore/Sources/DonpaKit/MangaPanelView.swift"
  - "Packages/DonpaCore/Sources/DonpaKit/TitleScreen.swift"
  - "Packages/DonpaCore/Sources/DonpaKit/BoardSelectionPicker.swift"
  - "Packages/DonpaCore/Sources/DonpaKit/GameViewRoot.swift"
  - "Packages/DonpaCore/Sources/DonpaKit/NewGamePopup.swift"
  - "Packages/DonpaCore/Sources/DonpaKit/StatusReadouts.swift"
  - "Packages/DonpaCore/Sources/DonpaKit/AboutView.swift"
  - "Packages/DonpaCore/Sources/DonpaKit/Navigator.swift"
  - "Packages/DonpaCore/Sources/DonpaKit/GameViewModel.swift"
  - "Packages/DonpaCore/Sources/DonpaKit/Settings.swift"
  - "Packages/DonpaCore/Sources/DonpaKit/Palette.swift"
  - "Packages/DonpaCore/Tests/**"

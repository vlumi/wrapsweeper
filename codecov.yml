# Coverage tracks the testable game logic, not the SpriteKit/SwiftUI view layer
# (which needs UI automation this project doesn't run). The two are split by
# Swift target: DonpaCore is pure, headlessly-testable logic and is gated;
# DonpaKit is the SpriteKit scene + SwiftUI glue and is ignored wholesale. Keep
# logic in DonpaCore so it's covered automatically — no per-file edits here when
# a view file is added or split for the lint length limit.

coverage:
  status:
    project:
      default:
        target: auto          # don't drop below the current project coverage
        threshold: 2%         # tolerate small fluctuations
    patch:
      default:
        target: 80%           # new (non-ignored) code must be ≥80% covered
        threshold: 0%         # no slack below the target

comment:
  # Only comment when coverage actually changed; keeps PRs quiet.
  require_changes: true

# The whole DonpaKit target is the untestable view layer. A new file under it is
# ignored by the glob automatically; pure logic belongs in DonpaCore instead,
# where it's tracked. Tests themselves aren't coverage subjects.
ignore:
  - "Packages/DonpaCore/Sources/DonpaKit/**"
  - "Packages/DonpaCore/Tests/**"

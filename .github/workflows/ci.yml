name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref so stale builds don't queue up.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  # Pin to the same Xcode the project is developed against (26.5), which is the
  # macos-26 image's default. Explicit so CI stays deterministic if the image's
  # default later changes.
  XCODE_VERSION: "26.5"

jobs:
  lint:
    name: Lint & format
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v7
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}
      - name: SwiftLint
        run: |
          brew install swiftlint
          swiftlint lint --strict
      - name: swift-format
        run: |
          swift format lint --strict --recursive --configuration .swift-format \
            Packages/WrapsweeperCore/Sources Packages/WrapsweeperCore/Tests Sources

  test:
    name: Test core logic
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v7
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}
      - name: Cache SwiftPM
        uses: actions/cache@v5
        with:
          path: Packages/WrapsweeperCore/.build
          key: spm-${{ runner.os }}-${{ env.XCODE_VERSION }}-${{ hashFiles('Packages/WrapsweeperCore/Package.swift') }}
          restore-keys: |
            spm-${{ runner.os }}-${{ env.XCODE_VERSION }}-
      - name: Run logic tests with coverage
        working-directory: Packages/WrapsweeperCore
        run: swift test --enable-code-coverage
      - name: Export coverage report
        working-directory: Packages/WrapsweeperCore
        run: |
          PROF=$(find .build -name '*.profdata' | head -1)
          BIN=$(find .build -name 'WrapsweeperCorePackageTests.xctest' -type d | head -1)/Contents/MacOS/WrapsweeperCorePackageTests
          # Exclude build artifacts, tests, and the SpriteKit/SwiftUI view layer
          # (which needs UI automation to exercise) so the figure reflects the
          # unit-tested logic. CellLayout and Scoreboard stay measured.
          xcrun llvm-cov export "$BIN" -instr-profile "$PROF" -format=lcov \
            -ignore-filename-regex='(\.build|Tests)/|WrapsweeperKit/(BoardScene|BoardView|GameView|GameViewModel)\.swift' \
            > coverage.lcov
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          files: Packages/WrapsweeperCore/coverage.lcov
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  build:
    name: Build apps
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v7
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}
      - name: Cache SwiftPM
        uses: actions/cache@v5
        with:
          path: Packages/WrapsweeperCore/.build
          key: spm-${{ runner.os }}-${{ env.XCODE_VERSION }}-${{ hashFiles('Packages/WrapsweeperCore/Package.swift') }}
          restore-keys: |
            spm-${{ runner.os }}-${{ env.XCODE_VERSION }}-
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Generate project
        run: xcodegen generate
      - name: Build macOS (no signing)
        run: |
          xcodebuild build \
            -project Wrapsweeper.xcodeproj \
            -scheme Wrapsweeper-macOS \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO
      - name: Build iOS (simulator)
        run: |
          xcodebuild build \
            -project Wrapsweeper.xcodeproj \
            -scheme Wrapsweeper-iOS \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO
